name: CI/CD Pipeline
on:
  pull_request:
    branches:
      - master
      - develop
jobs:
  backend-tests:
    name: Backend Tests + JaCoCo
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11
          cache: maven
      - name: Run backend tests
        run: mvn clean test
      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v6
        with:
          name: backend-jacoco-report
          path: back/target/site/jacoco/
  frontend-tests:
    name: Frontend Tests + Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: front/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run Angular tests with coverage
        run: npm run test
      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v6
        with:
          name: frontend-coverage-report
          path: front/coverage/
  sonar-analysis:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Build backend
        working-directory: back
        run: mvn clean verify
      - name: Install frontend deps
        working-directory: front
        run: npm ci
      - name: Generate frontend coverage
        working-directory: front
        run: npm run test -- --watch=false --code-coverage --browsers=ChromeHeadless
      - name: Sonar Scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: SonarCloud Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  docker-build-push:
    name: Build & Push Docker Images
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-tests
      - sonar-analysis
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Login Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11
      - name: Build backend jar
        working-directory: back
        run: mvn clean package -DskipTests
      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: ./back
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-back:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-back:${{ github.sha }}
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Build Angular app
        working-directory: front
        run: |
          npm ci
          npm run build
      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./front
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-front:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-front:${{ github.sha }}